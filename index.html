<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Box Store | إدارة داخلية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #9b59b6; --s: #3498db; --bg: #f8faff; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        header { background: white; padding: 15px; border-bottom: 3px solid var(--p); text-align: center; }
        .container { max-width: 900px; margin: 20px auto; padding: 20px; }
        
        /* شبكة المنتجات */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .card img { max-width: 100%; height: 140px; object-fit: contain; }
        .btn { background: linear-gradient(135deg, var(--s), var(--p)); color: white; border: none; padding: 10px; border-radius: 15px; cursor: pointer; font-weight: bold; width: 100%; }

        /* النماذج */
        #order-form, #thanks, #admin-view { display: none; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); max-width: 500px; margin: auto; text-align: right; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 8px; border: 1px solid #ddd; border-radius: 8px; }
        .submit-btn { background: #27ae60; color: white; width: 100%; padding: 12px; border: none; border-radius: 10px; cursor: pointer; margin-top: 15px; font-weight: bold; }

        /* لوحة التحكم */
        .order-item { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 0.9rem; }
        .order-item b { color: var(--p); }
    </style>
</head>
<body>

<header><h1>My Box Store</h1></header>

<div class="container">
    <!-- شبكة المنتجات -->
    <div id="main-grid" class="grid">
        <div class="card"><img src="Gemini_Generated_Image_wmmh7rwmmh7rwmmh.png"><h3>تيشرت</h3><button class="btn" onclick="openForm('تيشرت', true)">اطلب</button></div>
        <div class="card"><img src="mug.png"><h3>مج</h3><button class="btn" onclick="openForm('مج', false)">اطلب</button></div>
        <div class="card"><img src="shield.png"><h3>درع</h3><button class="btn" onclick="openForm('درع', false)">اطلب</button></div>
        <div class="card"><img src="cert.png"><h3>شهادة</h3><button class="btn" onclick="openForm('شهادة', false)">اطلب</button></div>
    </div>

    <!-- فورم الطلب -->
    <div id="order-form">
        <h3 id="form-title" style="text-align:center;"></h3>
        <form id="saveOrder">
            <label>رقم هاتفك:</label><input type="tel" id="phone" required>
            <div id="size-div" style="display:none;"><label>المقاس:</label><select id="size"><option>S</option><option>M</option><option>L</option><option>XL</option></select></div>
            <label>اللون:</label><input type="text" id="color">
            <label>ملاحظات:</label><textarea id="notes"></textarea>
            <button type="submit" class="submit-btn">تأكيد الطلب</button>
            <p onclick="goBack()" style="text-align:center; color:gray; cursor:pointer; margin-top:10px;">إلغاء</p>
        </form>
    </div>

    <!-- رسالة الشكر -->
    <div id="thanks" style="text-align:center;">
        <h2 style="color:#27ae60;">تم استلام طلبك! ✅</h2>
        <p>شكراً لثقتك بنا، سنتواصل معك قريباً.</p>
        <button class="btn" style="width:auto;" onclick="location.reload()">العودة</button>
    </div>

    <!-- عرض الطلبات (لك أنت فقط) -->
    <div id="admin-view">
        <h3 style="text-align:center;">قائمة الطلبات المستلمة 📋</h3>
        <div id="orders-list"></div>
        <button class="btn" style="background:gray; margin-top:15px;" onclick="location.reload()">إغلاق</button>
        <button class="btn" style="background:red; margin-top:5px;" onclick="clearAll()">مسح كل الطلبات</button>
    </div>
</div>

<!-- زر الدخول السري (النقطة في الأسفل) -->
<footer style="margin-top:100px; opacity:0.1; cursor:pointer;" onclick="showAdmin()">.</footer>

<script>
    let currentP = "";

    function openForm(p, showSize) {
        currentP = p;
        document.getElementById('main-grid').style.display = 'none';
        document.getElementById('order-form').style.display = 'block';
        document.getElementById('form-title').innerText = "طلب " + p;
        document.getElementById('size-div').style.display = showSize ? 'block' : 'none';
    }

    function goBack() { location.reload(); }

    document.getElementById('saveOrder').onsubmit = function(e) {
        e.preventDefault();
        
        // تجهيز البيانات
        const newOrder = {
            product: currentP,
            phone: document.getElementById('phone').value,
            color: document.getElementById('color').value,
            size: document.getElementById('size').value,
            notes: document.getElementById('notes').value,
            date: new Date().toLocaleString()
        };

        // جلب الطلبات القديمة وإضافة الجديد
        let orders = JSON.parse(localStorage.getItem('myOrders') || "[]");
        orders.push(newOrder);
        localStorage.setItem('myOrders', JSON.stringify(orders));

        // شاشة الشكر
        document.getElementById('order-form').style.display = 'none';
        document.getElementById('thanks').style.display = 'block';
    };

    // لوحة التحكم السرية
    function showAdmin() {
        const pass = prompt("كلمة المرور:");
        if(pass === "123") {
            document.getElementById('main-grid').style.display = 'none';
            document.getElementById('admin-view').style.display = 'block';
            displayOrders();
        }
    }

    function displayOrders() {
        const list = document.getElementById('orders-list');
        const orders = JSON.parse(localStorage.getItem('myOrders') || "[]");
        list.innerHTML = orders.length === 0 ? "لا توجد طلبات بعد." : "";
        orders.reverse().forEach(o => {
            list.innerHTML += `<div class="order-item">
                <b>${o.product}</b> - ${o.phone}<br>
                <span>اللون: ${o.color} | المقاس: ${o.size}</span><br>
                <small>${o.notes}</small><br>
                <small style="color:gray;">${o.date}</small>
            </div>`;
        });
    }

    function clearAll() {
        if(confirm("هل أنت متأكد من مسح جميع الطلبات؟")) {
            localStorage.removeItem('myOrders');
            displayOrders();
        }
    }
</script>

</body>
</html>
