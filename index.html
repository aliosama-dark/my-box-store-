<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Box Store | تخصيص الهدايا</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-purple: #9b59b6;
            --secondary-blue: #3498db;
            --soft-bg: #f8faff;
            --dark-text: #2c3e50;
            --white: #ffffff;
            --grad: linear-gradient(135deg, #3498db, #9b59b6);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; font-family: Cairo, sans-serif; }
        body { background-color: var(--soft-bg); color: var(--dark-text); margin: 0; padding: 0; }

        header {
            background: var(--white);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-bottom: 3px solid var(--primary-purple);
        }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }

        .product-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            text-align: center;
            padding-bottom: 20px;
        }

        .img-box { height: 200px; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .btn-order {
            background: var(--grad);
            color: white;
            padding: 10px 30px;
            border-radius: 50px;
            cursor: pointer;
            border: none;
            font-weight: bold;
        }

        #order-section { display: none; background: white; padding: 30px; border-radius: 25px; max-width: 700px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--primary-purple); }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #f0f3f7; border-radius: 10px; }
        
        /* تنسيق حقل رفع الملفات */
        input[type="file"] { background: #fdfdfd; border: 2px dashed var(--secondary-blue); cursor: pointer; }

        .special-field { display: none; }

        .btn-submit { background: #27ae60; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 10px; }
        
        .upload-notice { font-size: 0.85rem; color: #e67e22; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>My Box Store</h1>
    <p>صمم هديتك بنفسك وارفع صورتك الخاصة</p>
</header>

<div class="container">
    <div class="products-grid" id="main-grid">
        <div class="product-card">
            <div class="img-box"><img src="Gemini_Generated_Image_wmmh7rwmmh7rwmmh.png" alt="T-Shirt"></div>
            <h3>تيشرتات قطن</h3>
            <button class="btn-order" onclick="openOrder('تيشرت قطن', true)">اطلب الآن</button>
        </div>

        <div class="product-card">
            <div class="img-box"><img src="mug.png" alt="Mug"></div>
            <h3>مجات حرارية</h3>
            <button class="btn-order" onclick="openOrder('مج حراري', true)">اطلب الآن</button>
        </div>

        <div class="product-card">
            <div class="img-box"><img src="shield.png" alt="Shield"></div>
            <h3>دروع كريستال</h3>
            <button class="btn-order" onclick="openOrder('درع كريستال', true)">اطلب الآن</button>
        </div>

        <div class="product-card">
            <div class="img-box"><img src="cert.png" alt="Certificate"></div>
            <h3>شهادات تقدير</h3>
            <button class="btn-order" onclick="openOrder('شهادة تقدير', false)">اطلب الآن</button>
        </div>
    </div>

    <div id="order-section">
        <div onclick="goBack()" style="cursor:pointer; color:var(--secondary-blue); margin-bottom:15px; font-weight:bold;">← العودة</div>
        <h2 id="selected-product" style="text-align:center; color:var(--primary-purple);"></h2>
        
        <form id="orderForm">
            <div class="form-group">
                <label>الاسم بالكامل</label>
                <input type="text" id="custName" required placeholder="اسم المستلم">
            </div>

            <!-- حقل رفع الصورة (يظهر لمنتجات محددة) -->
            <div class="form-group special-field" id="upload-field">
                <label>ارفع التصميم أو الصورة (اختياري)</label>
                <input type="file" id="pImage" accept="image/*">
                <p class="upload-notice">⚠️ سيُطلب منك إرسال الصورة في الواتساب بعد قليل.</p>
            </div>

            <div class="form-group special-field" id="size-field">
                <label>المقاس</label>
                <select id="pSize">
                    <option value="S">Small</option><option value="M">Medium</option>
                    <option value="L">Large</option><option value="XL">X-Large</option>
                </select>
            </div>

            <div class="form-group">
                <label>اللون</label>
                <input type="text" id="pColor" placeholder="مثلاً: أسود، أبيض...">
            </div>

            <div class="form-group">
                <label>العنوان</label>
                <input type="text" id="custAddr" required>
            </div>

            <div class="form-group">
                <label>ملاحظات الطباعة</label>
                <textarea id="custNotes" rows="3" placeholder="اكتب الاسم أو العبارة المطلوبة..."></textarea>
            </div>

            <button type="submit" class="btn-submit">تأكيد وإرسال للواتساب</button>
        </form>
    </div>
</div>

<script>
    let currentProduct = "";

    function openOrder(product, needsUpload) {
        currentProduct = product;
        document.getElementById('main-grid').style.display = 'none';
        document.getElementById('order-section').style.display = 'block';
        document.getElementById('selected-product').innerText = "تخصيص: " + product;

        // التحكم في ظهور الحقول
        document.getElementById('upload-field').style.display = needsUpload ? 'block' : 'none';
        document.getElementById('size-field').style.display = (product === 'تيشرت قطن') ? 'block' : 'none';
        
        window.scrollTo(0,0);
    }

    function goBack() {
        document.getElementById('main-grid').style.display = 'grid';
        document.getElementById('order-section').style.display = 'none';
    }

    document.getElementById('orderForm').onsubmit = function(e) {
        e.preventDefault();
        
        const hasImage = document.getElementById('pImage').files.length > 0;
        const imgStatus = hasImage ? "✅ (سأقوم بإرفاق الصورة الآن)" : "❌ (لا يوجد)";
        
        const name = document.getElementById('custName').value;
        const color = document.getElementById('pColor').value;
        const size = (currentProduct === 'تيشرت قطن') ? `%0A📏 *المقاس:* ${document.getElementById('pSize').value}` : "";
        const addr = document.getElementById('custAddr').value;
        const notes = document.getElementById('custNotes').value;

        const fullMsg = `*طلب جديد من My Box Store* 📦%0A--------------------%0A🔥 *المنتج:* ${currentProduct}%0A🖼️ *إرفاق صورة:* ${imgStatus}%0A👤 *العميل:* ${name}%0A🎨 *اللون:* ${color}${size}%0A📍 *العنوان:* ${addr}%0A📝 *التفاصيل:* ${notes}%0A--------------------`;
        
        if(hasImage) {
            alert("سيتم فتح واتساب الآن.. من فضلك قم بإرسال الرسالة ثم أرفق الصورة التي اخترتها من الاستوديو.");
        }
        
        window.open(`https://wa.me/201032543968?text=${fullMsg}`);
    };
</script>

</body>
</html>
