<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Box Store | هدايا وطباعة احترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* ألوان مريحة للعين مستوحاة من الهوية الخاصة بك */
            --primary-purple: #9b59b6;
            --secondary-blue: #3498db;
            --soft-bg: #f8faff;
            --dark-text: #2c3e50;
            --white: #ffffff;
            --grad: linear-gradient(135deg, #3498db, #9b59b6);
        }

        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--soft-bg);
            color: var(--dark-text);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* رأس الصفحة */
        header {
            background: var(--white);
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-bottom: 3px solid var(--primary-purple);
        }

        .logo-container img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--secondary-blue);
            margin-bottom: 15px;
        }

        header h1 {
            margin: 0;
            font-size: 2rem;
            background: var(--grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* شبكة المنتجات */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            border: 1px solid #edf2f7;
            text-align: center;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(155, 89, 182, 0.1);
        }

        .img-box {
            background: #fdfdfd;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .img-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .card-content {
            padding: 20px;
        }

        .card-content h3 {
            margin: 0 0 20px 0;
            font-size: 1.3rem;
        }

        .btn-order {
            display: inline-block;
            background: var(--grad);
            color: var(--white);
            padding: 12px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            border: none;
            width: 90%;
        }

        /* واجهة طلب العميل */
        #order-section {
            display: none;
            background: var(--white);
            padding: 40px;
            border-radius: 30px;
            max-width: 800px;
            margin: 20px auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
        }

        .back-link {
            color: var(--secondary-blue);
            cursor: pointer;
            display: inline-block;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input, textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #f0f3f7;
            border-radius: 12px;
            font-size: 1rem;
            background: #f9fbff;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-purple);
            background: var(--white);
        }

        .btn-submit {
            background: #27ae60;
            color: var(--white);
            border: none;
            padding: 18px;
            border-radius: 15px;
            width: 100%;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #219150;
            box-shadow: 0 10px 20px rgba(39, 174, 96, 0.2);
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="logo.jpg" alt="My Box Store Logo">
    </div>
    <h1>أهلاً بك في My Box Store</h1>
    <p>بوابتك للهدايا المخصصة والطباعة الإبداعية</p>
</header>

<div class="container">
    <!-- شبكة عرض المنتجات -->
    <div class="products-grid" id="main-grid">
        <div class="product-card">
            <div class="img-box"><img src="mug.png" alt="Mug"></div>
            <div class="card-content">
                <h3>مجات حرارية</h3>
                <button class="btn-order" onclick="openOrder('مج حراري')">اطلب الآن</button>
            </div>
        </div>

        <div class="product-card">
            <div class="img-box"><img src="tshirt.png" alt="T-Shirt"></div>
            <div class="card-content">
                <h3>تيشرتات قطن</h3>
                <button class="btn-order" onclick="openOrder('تيشرت قطن')">اطلب الآن</button>
            </div>
        </div>

        <div class="product-card">
            <div class="img-box"><img src="shield.png" alt="Shield"></div>
            <div class="card-content">
                <h3>دروع كريستال</h3>
                <button class="btn-order" onclick="openOrder('درع كريستال')">اطلب الآن</button>
            </div>
        </div>

        <div class="product-card">
            <div class="img-box"><img src="cert.png" alt="Certificate"></div>
            <div class="card-content">
                <h3>شهادات تقدير</h3>
                <button class="btn-order" onclick="openOrder('شهادة تقدير')">اطلب الآن</button>
            </div>
        </div>
    </div>

    <!-- نموذج الطلب -->
    <div id="order-section">
        <div class="back-link" onclick="goBack()">← العودة للمنتجات</div>
        <h2 id="selected-product" style="color: var(--primary-purple);">تفاصيل الطلب</h2>
        <form id="orderForm">
            <div class="form-group">
                <label>الاسم الكامل</label>
                <input type="text" id="custName" required placeholder="مثال: أحمد محمد">
            </div>
            <div class="form-group">
                <label>العنوان بالتفصيل</label>
                <textarea id="custAddr" rows="2" required placeholder="المحافظة، المدينة، الشارع..."></textarea>
            </div>
            <div class="form-group">
                <label>وصف الطلب (الألوان، المقاسات، أو أي تفاصيل إضافية)</label>
                <textarea id="custNotes" rows="4" placeholder="اكتب ملاحظاتك هنا..."></textarea>
            </div>
            <button type="submit" class="btn-submit">تأكيد الطلب عبر واتساب</button>
        </form>
    </div>
</div>

<script>
    let pName = "";

    function openOrder(product) {
        pName = product;
        document.getElementById('main-grid').style.display = 'none';
        document.getElementById('order-section').style.display = 'block';
        document.getElementById('selected-product').innerText = "تخصيص: " + product;
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function goBack() {
        document.getElementById('main-grid').style.display = 'grid';
        document.getElementById('order-section').style.display = 'none';
    }

    document.getElementById('orderForm').onsubmit = function(e) {
        e.preventDefault();
        const name = document.getElementById('custName').value;
        const addr = document.getElementById('custAddr').value;
        const notes = document.getElementById('custNotes').value;

        const text = `*طلب جديد من متجر My Box Store* 📦%0A--------------------%0A📦 *المنتج:* ${pName}%0A👤 *العميل:* ${name}%0A📍 *العنوان:* ${addr}%0A📝 *التفاصيل:* ${notes}%0A--------------------`;
        
        // الرقم الخاص بك مدمج في الرابط
        window.open(`https://wa.me/201032543968?text=${text}`);
    };
</script>

</body>
</html>
