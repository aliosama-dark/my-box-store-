<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Box Store | هداياك بكل حب</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("-I-pY1UXrpFHj2Voh"); 
       })();
    </script>

    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --accent: #fd79a8;
            --dark: #2d3436;
            --bg: #f9f9fb;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--bg); 
            margin: 0; color: var(--dark);
        }

        header { 
            background: white; 
            padding: 30px 20px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        .main-logo {
            width: 120px;
            height: auto;
            border-radius: 25px;
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        header h1 { 
            font-size: 2rem; 
            font-weight: 900;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 10px 0;
        }

        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
            gap: 25px; 
        }

        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 30px; 
            text-align: center; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
            transition: 0.3s;
        }

        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(108, 92, 231, 0.1); }

        .card img { 
            width: 100%; height: 200px; 
            object-fit: cover; 
            border-radius: 20px; 
            margin-bottom: 15px;
        }

        .btn { 
            background: linear-gradient(135deg, var(--secondary), var(--primary)); 
            color: white; border: none; padding: 12px; 
            border-radius: 18px; cursor: pointer; width: 100%; 
            font-weight: 700; font-size: 1rem;
        }

        #order-form { 
            display: none; background: white; padding: 35px; 
            border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        input, select, textarea { 
            width: 100%; padding: 15px; margin: 10px 0; 
            border: 2px solid #f1f1f1; border-radius: 15px; font-family: 'Cairo';
        }

        .submit-btn { 
            background: #00b894; color: white; width: 100%; 
            padding: 18px; border: none; border-radius: 15px; 
            font-weight: 800; cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <img src="logo.jpg" alt="Logo" class="main-logo">
    <h1>My Box Store</h1>
    <p style="color: #636e72;">نطبع مشاعرك على هداياك بكل حب ❤️</p>
</header>

<div class="container">
    <div id="main-grid" class="grid animate__animated animate__fadeIn">
        <!-- تيشرتات -->
        <div class="card">
            <img src="Gemini_Generated_Image_wmmh7rwmmh7rwmmh.png">
            <h3>تيشرتات قطن</h3>
            <button class="btn" onclick="openForm('تيشرت قطن', true)">تخصيص الآن ✨</button>
        </div>
        <!-- مجات -->
        <div class="card">
            <img src="mug.png">
            <h3>مجات حرارية</h3>
            <button class="btn" onclick="openForm('مج حراري', false)">اطلب الآن ✨</button>
        </div>
        <!-- دروع -->
        <div class="card">
            <img src="shield.png">
            <h3>دروع كريستال</h3>
            <button class="btn" onclick="openForm('درع كريستال', false)">تخليد ذكرى ✨</button>
        </div>
        <!-- الشهادة عادت هنا -->
        <div class="card">
            <img src="cert.png">
            <h3>شهادات تقدير</h3>
            <button class="btn" onclick="openForm('شهادة تقدير', false)">تجهيز الشهادة ✨</button>
        </div>
    </div>

    <!-- نموذج الطلب -->
    <div id="order-form" class="animate__animated animate__zoomIn">
        <h2 id="form-title" style="text-align:center; color: var(--primary);"></h2>
        <form id="contact-form">
            <input type="text" id="cust_name" placeholder="الاسم بالكامل" required>
            <input type="tel" id="cust_phone" placeholder="رقم الواتساب" required>
            <div id="s-div" style="display:none;">
                <select id="cust_size">
                    <option value="M">Medium</option>
                    <option value="L">Large</option>
                    <option value="XL">X-Large</option>
                </select>
            </div>
            <input type="text" id="cust_color" placeholder="اللون المطلوب">
            <textarea id="cust_notes" rows="4" placeholder="اكتب ملاحظاتك هنا..."></textarea>
            <button type="submit" class="submit-btn" id="s-btn">إرسال الطلب 🚀</button>
            <p onclick="location.reload()" style="text-align:center; cursor:pointer; color:var(--primary); margin-top:15px;">← العودة للمتجر</p>
        </form>
    </div>
</div>

<script>
    let currentProduct = "";
    function openForm(p, s) {
        currentProduct = p;
        document.getElementById('main-grid').style.display = 'none';
        document.getElementById('order-form').style.display = 'block';
        document.getElementById('form-title').innerText = "طلب " + p;
        document.getElementById('s-div').style.display = s ? 'block' : 'none';
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    document.getElementById('contact-form').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('s-btn');
        btn.innerText = "جاري الإرسال...";
        btn.disabled = true;

        const templateParams = {
            name: document.getElementById('cust_name').value,
            prod: currentProduct,
            phone: document.getElementById('cust_phone').value,
            size: currentProduct === 'تيشرت قطن' ? document.getElementById('cust_size').value : "N/A",
            color: document.getElementById('cust_color').value || "حسب الاختيار",
            notes: document.getElementById('cust_notes').value || "لا يوجد",
            time: new Date().toLocaleString('ar-EG')
        };

        emailjs.send("service_irixc5m", "template_9psshpd", templateParams)
        .then(() => {
            alert("تم استلام طلبك بنجاح!");
            location.reload();
        }, (err) => {
            alert("حدث خطأ.. حاول مرة أخرى");
            btn.disabled = false;
        });
    };
</script>
</body>
</html>
