<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Box Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("-I-pY1UXrpFHj2Voh"); 
       })();
    </script>

    <style>
        :root {
            --primary: #9b59b6;
            --secondary: #3498db;
            --dark: #2c3e50;
            --light: #f8f9fa;
            --white: #ffffff;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--light); 
            margin: 0; padding: 0; color: var(--dark);
            overflow-x: hidden;
        }

        header { 
            background: var(--white); 
            padding: 20px 0; 
            text-align: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1000;
        }

        /* تنسيق اللوجو المستخرج من مشروعك */
        .logo-img {
            width: 120px; /* حجم اللوجو */
            height: auto;
            border-radius: 15px;
            animation: pulseCustom 2s infinite ease-in-out;
            cursor: pointer;
        }

        @keyframes pulseCustom {
            0% { transform: scale(1); filter: drop-shadow(0 0 0px rgba(155, 89, 182, 0)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 10px rgba(155, 89, 182, 0.3)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 0px rgba(155, 89, 182, 0)); }
        }

        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); 
            gap: 25px; 
        }

        .card { 
            background: var(--white); 
            padding: 20px; 
            border-radius: 25px; 
            border: 1px solid rgba(0,0,0,0.03);
            text-align: center; 
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.02);
        }

        .card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
        }

        .card img { 
            width: 100%; height: 200px; 
            object-fit: cover; 
            border-radius: 18px; 
            margin-bottom: 15px;
        }

        .btn { 
            background: linear-gradient(135deg, var(--secondary), var(--primary)); 
            color: white; border: none; padding: 14px; 
            border-radius: 15px; cursor: pointer; width: 100%; 
            font-weight: 700;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        #order-form { 
            display: none; background: var(--white); 
            padding: 30px; border-radius: 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            animation: fadeInUp 0.5s;
        }

        .form-header { color: var(--primary); text-align: center; font-weight: 800; font-size: 1.5rem; margin-bottom: 30px; }

        input, select, textarea { 
            width: 100%; padding: 15px; margin-top: 8px; 
            border: 2px solid #eee; border-radius: 15px; 
            font-family: 'Tajawal', sans-serif;
        }

        .submit-btn { 
            background: #2ecc71; color: white; width: 100%; 
            padding: 18px; border: none; border-radius: 15px; 
            cursor: pointer; margin-top: 30px; font-weight: 800; 
            font-size: 1.1rem;
        }

        .back-btn { color: var(--secondary); cursor: pointer; font-weight: 700; margin-bottom: 20px; display: inline-block; }
    </style>
</head>
<body>

<header>
    <div class="animate__animated animate__fadeInDown">
        <!-- استخدام اللوجو الموجود في المشروع -->
        <img src="image_5e6711.jpg" alt="My Box Store" class="logo-img" onclick="location.reload()">
        <h1 style="margin-top: 10px; font-weight: 800; background: linear-gradient(to right, #9b59b6, #3498db); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">My Box Store</h1>
    </div>
</header>

<div class="container">
    <div id="main-grid" class="grid animate__animated animate__fadeIn">
        <div class="card">
            <img src="Gemini_Generated_Image_wmmh7rwmmh7rwmmh.png">
            <h3>تيشرتات قطن</h3>
            <button class="btn" onclick="openForm('تيشرت قطن', true)">اطلب الآن</button>
        </div>
        <div class="card">
            <img src="mug.png">
            <h3>مجات حرارية</h3>
            <button class="btn" onclick="openForm('مج حراري', false)">اطلب الآن</button>
        </div>
        <div class="card">
            <img src="shield.png">
            <h3>دروع كريستال</h3>
            <button class="btn" onclick="openForm('درع كريستال', false)">اطلب الآن</button>
        </div>
        <div class="card">
            <img src="cert.png">
            <h3>شهادات تقدير</h3>
            <button class="btn" onclick="openForm('شهادة تقدير', false)">اطلب الآن</button>
        </div>
    </div>

    <!-- نموذج الطلب (EmailJS) -->
    <div id="order-form">
        <span class="back-btn" onclick="location.reload()">← العودة للمنتجات</span>
        <div class="form-header" id="f-title"></div>
        <form id="contact-form">
            <label>اسمك الجميل:</label>
            <input type="text" id="cust_name" placeholder="اكتب اسمك هنا" required>
            <label>رقم الواتساب:</label>
            <input type="tel" id="cust_phone" placeholder="01xxxxxxxxx" required>
            <div id="s-div" style="display:none;">
                <label>المقاس:</label>
                <select id="cust_size">
                    <option value="S">Small</option>
                    <option value="M" selected>Medium</option>
                    <option value="L">Large</option>
                    <option value="XL">X-Large</option>
                </select>
            </div>
            <label>اللون المطلوب:</label>
            <input type="text" id="cust_color" placeholder="مثال: أبيض">
            <label>ملاحظات إضافية:</label>
            <textarea id="cust_notes" rows="4" placeholder="أي تفاصيل أخرى تهمك؟"></textarea>
            <button type="submit" class="submit-btn" id="s-btn">تأكيد الطلب ✨</button>
        </form>
    </div>

    <div id="thanks" style="display:none; text-align: center; padding: 40px;">
        <h2 style="color:#2ecc71;">تم استلام طلبك يا فنان! ✅</h2>
        <p>سنتواصل معك عبر الواتساب في أقرب وقت ممكن.</p>
        <button class="btn" style="width:auto; padding: 12px 40px;" onclick="location.reload()">العودة للمتجر</button>
    </div>
</div>

<script>
    let currentProduct = "";
    function openForm(p, s) {
        currentProduct = p;
        document.getElementById('main-grid').style.display = 'none';
        document.getElementById('order-form').style.display = 'block';
        document.getElementById('f-title').innerText = "تخصيص طلب " + p;
        document.getElementById('s-div').style.display = s ? 'block' : 'none';
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    document.getElementById('contact-form').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('s-btn');
        btn.innerText = "جاري إرسال طلبك...";
        btn.disabled = true;

        const templateParams = {
            name: document.getElementById('cust_name').value,
            prod: currentProduct,
            phone: document.getElementById('cust_phone').value,
            size: currentProduct === 'تيشرت قطن' ? document.getElementById('cust_size').value : "N/A",
            color: document.getElementById('cust_color').value || "غير محدد",
            notes: document.getElementById('cust_notes').value || "لا يوجد",
            time: new Date().toLocaleString('ar-EG')
        };

        emailjs.send("service_irixc5m", "template_9psshpd", templateParams)
        .then(() => {
            document.getElementById('order-form').style.display = 'none';
            document.getElementById('thanks').style.display = 'block';
        }, (err) => {
            alert("حدث خطأ، حاول مرة أخرى");
            btn.disabled = false;
        });
    };
</script>
</body>
</html>
