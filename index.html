<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Box Store | احترافية الطباعة</title>
    <style>
        :root {
            /* الألوان مستوحاة من اللوجو الخاص بك */
            --primary: #9b59b6;
            --secondary: #3498db;
            --bg-light: #fdfdfd;
            --text-dark: #2d3436;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f7f9fc; 
            margin: 0; 
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* الهيدر */
        .navbar {
            background: white;
            padding: 15px 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
        }

        .navbar img { height: 60px; border-radius: 50%; }

        .hero {
            text-align: center;
            padding: 60px 20px;
            background: white;
            margin-bottom: 30px;
        }

        .hero h1 { 
            font-size: 2.2rem; 
            color: var(--primary);
            margin-bottom: 10px;
        }

        /* شبكة المنتجات واسعة ومريحة */
        .container { max-width: 1100px; margin: auto; padding: 20px; }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: 0.4s;
            border: 1px solid #eee;
        }

        .card:hover { transform: translateY(-10px); border-color: var(--secondary); }

        .card img { width: 100%; height: 250px; object-fit: cover; }

        .card-body { padding: 20px; text-align: center; }

        .btn-select {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }

        /* منطقة الطلب واسعة جداً */
        #order-form-container {
            display: none;
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            max-width: 800px;
            margin: 20px auto;
        }

        .input-box {
            width: 100%;
            padding: 15px;
            margin: 10px 0 20px 0;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            font-size: 1rem;
            background: #fafafa;
        }

        .input-box:focus { border-color: var(--secondary); outline: none; background: white; }

        .form-label { font-weight: bold; display: block; margin-right: 5px; }

        .btn-confirm {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 15px;
            width: 100%;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3);
        }

        .back-link { color: var(--secondary); cursor: pointer; display: inline-block; margin-bottom: 20px; }

    </style>
</head>
<body>

<div class="navbar">
    <div style="font-weight: bold; font-size: 1.5rem;">MY BOX STORE</div>
    <img src="logo.jpg" alt="Logo">
</div>

<div class="hero" id="hero-text">
    <h1>أهلاً بك في My Box Store</h1>
    <p>اختر المنتج الذي تريده وسنقوم بالباقي</p>
</div>

<div class="container" id="main-content">
    <div class="products-grid" id="grid">
        <!-- تأكد من وجود الصور بنفس هذه الأسماء في GitHub -->
        <div class="card">
            <img src="mug.png" alt="Mug">
            <div class="card-body">
                <h3>مجات حرارية مميزة</h3>
                <button class="btn-select" onclick="showOrder('مج حراري')">تخصيص الآن</button>
            </div>
        </div>

        <div class="card">
            <img src="tshirt.png" alt="T-shirt">
            <div class="card-body">
                <h3>تيشرتات قطن فاخرة</h3>
                <button class="btn-select" onclick="showOrder('تيشرت قطن')">تخصيص الآن</button>
            </div>
        </div>

        <div class="card">
            <img src="shield.png" alt="Shield">
            <div class="card-body">
                <h3>دروع كريستال وتكريم</h3>
                <button class="btn-select" onclick="showOrder('درع كريستال')">تخصيص الآن</button>
            </div>
        </div>

        <div class="card">
            <img src="cert.png" alt="Certificate">
            <div class="card-body">
                <h3>شهادات تقدير فاخرة</h3>
                <button class="btn-select" onclick="showOrder('شهادة تقدير')">تخصيص الآن</button>
            </div>
        </div>
    </div>

    <!-- نموذج الطلب -->
    <div id="order-form-container">
        <div class="back-link" onclick="goBack()">← العودة للمنتجات</div>
        <h2 id="order-title" style="color: var(--primary);">تفاصيل طلبك</h2>
        <form id="orderForm">
            <label class="form-label">الاسم الكامل</label>
            <input type="text" id="name" class="input-box" required placeholder="اكتب اسمك هنا">

            <label class="form-label">رقم التواصل (واتساب)</label>
            <input type="tel" id="phone" class="input-box" required placeholder="010XXXXXXXX">

            <label class="form-label">العنوان بالتفصيل</label>
            <textarea id="address" class="input-box" rows="3" required placeholder="المحافظة، المنطقة، الشارع..."></textarea>

            <label class="form-label">ملاحظاتك (اللون، النص، المقاس...)</label>
            <textarea id="notes" class="input-box" rows="4" placeholder="اكتب كل ما يدور في ذهنك بخصوص التصميم"></textarea>

            <button type="submit" class="btn-confirm">تأكيد الطلب عبر واتساب</button>
        </form>
    </div>
</div>

<script>
    let selectedItem = "";

    function showOrder(item) {
        selectedItem = item;
        document.getElementById('grid').style.display = 'none';
        document.getElementById('hero-text').style.display = 'none';
        document.getElementById('order-form-container').style.display = 'block';
        document.getElementById('order-title').innerText = "تخصيص طلب: " + item;
        window.scrollTo(0,0);
    }

    function goBack() {
        document.getElementById('grid').style.display = 'grid';
        document.getElementById('hero-text').style.display = 'block';
        document.getElementById('order-form-container').style.display = 'none';
    }

    document.getElementById('orderForm').onsubmit = function(e) {
        e.preventDefault();
        const n = document.getElementById('name').value;
        const p = document.getElementById('phone').value;
        const a = document.getElementById('address').value;
        const nt = document.getElementById('notes').value;

        const fullMsg = `*طلب جديد من My Box Store* 📦%0A--------------------------%0A🔥 *المنتج:* ${selectedItem}%0A👤 *العميل:* ${n}%0A📞 *الهاتف:* ${p}%0A📍 *العنوان:* ${a}%0A📝 *التفاصيل:* ${nt}%0A--------------------------%0A_سأرسل لك الصورة الآن_`;
        
        window.open(`https://wa.me/201032543968?text=${fullMsg}`);
    };
</script>

</body>
</html>
