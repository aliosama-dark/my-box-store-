<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- تغيير اسم الرابط هنا -->
    <title>My Box Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("-I-pY1UXrpFHj2Voh"); 
       })();
    </script>

    <style>
        :root { --p: #9b59b6; --s: #3498db; --bg: #ffffff; }
        * { box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        header { background: white; padding: 20px; text-align: center; border-bottom: 1px solid #eee; }
        .container { max-width: 600px; margin: 20px auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 15px; border: 1px solid #eee; text-align: center; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .card img { max-width: 100%; height: 150px; object-fit: contain; border-radius: 10px; }
        .btn { background: linear-gradient(135deg, var(--s), var(--p)); color: white; border: none; padding: 12px; border-radius: 15px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        #order-form, #thanks { display: none; background: white; padding: 20px; border-radius: 15px; border: 1px solid #eee; }
        .form-header { color: var(--p); text-align: center; font-weight: bold; margin-bottom: 25px; font-size: 1.4rem; }
        label { display: block; margin-top: 20px; font-weight: bold; color: var(--p); font-size: 0.95rem; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #e0e0e0; border-radius: 10px; background: #fafafa; font-family: 'Cairo'; }
        .submit-btn { background: #27ae60; color: white; width: 100%; padding: 15px; border: none; border-radius: 12px; cursor: pointer; margin-top: 30px; font-weight: bold; font-size: 1.1rem; }
        .back-nav { color: #3498db; text-decoration: none; display: block; text-align: left; margin-bottom: 15px; font-size: 0.9rem; cursor: pointer; }
    </style>
</head>
<body>

<header><h1>My Box Store</h1></header>

<div class="container">
    <div id="main-grid" class="grid">
        <div class="card"><img src="Gemini_Generated_Image_wmmh7rwmmh7rwmmh.png"><h3>تيشرتات قطن</h3><button class="btn" onclick="openForm('تيشرت قطن', true)">اطلب الآن</button></div>
        <div class="card"><img src="mug.png"><h3>مجات حرارية</h3><button class="btn" onclick="openForm('مج حراري', false)">اطلب الآن</button></div>
        <div class="card"><img src="shield.png"><h3>دروع كريستال</h3><button class="btn" onclick="openForm('درع كريستال', false)">اطلب الآن</button></div>
        <div class="card"><img src="cert.png"><h3>شهادات تقدير</h3><button class="btn" onclick="openForm('شهادة تقدير', false)">اطلب الآن</button></div>
    </div>

    <div id="order-form">
        <div class="back-nav" onclick="location.reload()">العودة للمنتجات ←</div>
        <div class="form-header" id="f-title"></div>
        <form id="contact-form">
            <label>الاسم الكامل:</label>
            <input type="text" id="cust_name" required>
            <label>رقم هاتف الواتساب:</label>
            <input type="tel" id="cust_phone" required>
            <div id="s-div" style="display:none;"><label>المقاس:</label><select id="cust_size"><option value="S">S</option><option value="M">M</option><option value="L">L</option><option value="XL">XL</option></select></div>
            <label>اللون:</label>
            <input type="text" id="cust_color">
            <label>الملاحظات:</label>
            <textarea id="cust_notes" rows="4"></textarea>
            <button type="submit" class="submit-btn" id="s-btn">إرسال الطلب</button>
        </form>
    </div>

    <div id="thanks" style="text-align:center;">
        <h2 style="color:#27ae60;">تم الإرسال بنجاح! ✅</h2>
        <button class="btn" style="width:auto; padding: 10px 40px;" onclick="location.reload()">العودة</button>
    </div>
</div>

<script>
    let currentProduct = "";
    function openForm(p, s) {
        currentProduct = p;
        document.getElementById('main-grid').style.display = 'none';
        document.getElementById('order-form').style.display = 'block';
        document.getElementById('f-title').innerText = "طلب " + p;
        document.getElementById('s-div').style.display = s ? 'block' : 'none';
    }

    document.getElementById('contact-form').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('s-btn');
        btn.innerText = "جاري الإرسال...";
        btn.disabled = true;

        const templateParams = {
            name: document.getElementById('cust_name').value,
            prod: currentProduct,
            phone: document.getElementById('cust_phone').value,
            size: currentProduct === 'تيشرت قطن' ? document.getElementById('cust_size').value : "N/A",
            color: document.getElementById('cust_color').value || "غير محدد",
            notes: document.getElementById('cust_notes').value || "لا يوجد",
            time: new Date().toLocaleString('ar-EG')
        };

        emailjs.send("service_irixc5m", "template_9psshpd", templateParams)
        .then(() => {
            document.getElementById('order-form').style.display = 'none';
            document.getElementById('thanks').style.display = 'block';
        }, (err) => {
            alert("خطأ في الإرسال");
            btn.disabled = false;
        });
    };
</script>
</body>
</html>
