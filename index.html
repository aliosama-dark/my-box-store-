<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Box Store</title>
    
    <!-- خطوط جوجل الاحترافية -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <!-- مكتبة الأنميشن -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("-I-pY1UXrpFHj2Voh"); 
       })();
    </script>

    <style>
        :root {
            --primary: #9b59b6;
            --secondary: #3498db;
            --accent: #f1c40f;
            --dark: #2c3e50;
            --light: #f8f9fa;
            --white: #ffffff;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--light); 
            margin: 0; padding: 0; color: var(--dark);
            overflow-x: hidden;
        }

        /* هيدر احترافي مع مكان للوجو */
        header { 
            background: var(--white); 
            padding: 15px 0; 
            text-align: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .logo-placeholder {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 800; font-size: 1.5rem;
            box-shadow: 0 5px 15px rgba(155, 89, 182, 0.3);
            animation: pulse 2s infinite;
        }

        header h1 { 
            margin: 10px 0 0; font-size: 1.8rem; font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }

        /* حركات المنتجات */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); 
            gap: 25px; 
        }

        .card { 
            background: var(--white); 
            padding: 20px; 
            border-radius: 25px; 
            border: 1px solid rgba(0,0,0,0.03);
            text-align: center; 
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.02);
        }

        .card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
        }

        .card img { 
            width: 100%; height: 200px; 
            object-fit: cover; 
            border-radius: 18px; 
            margin-bottom: 15px;
        }

        .card h3 { font-size: 1.3rem; margin: 10px 0; color: var(--dark); }

        .btn { 
            background: linear-gradient(135deg, var(--secondary), var(--primary)); 
            color: white; border: none; padding: 14px; 
            border-radius: 15px; cursor: pointer; width: 100%; 
            font-weight: 700; font-size: 1rem;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        .btn:hover { letter-spacing: 1px; filter: brightness(1.1); }

        /* تصميم الفورم (النموذج) */
        #order-form { 
            display: none; background: var(--white); 
            padding: 30px; border-radius: 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            animation: fadeInUp 0.5s;
        }

        .form-header { 
            color: var(--primary); text-align: center; 
            font-weight: 800; font-size: 1.6rem; margin-bottom: 30px;
        }

        label { display: block; margin-top: 15px; font-weight: 700; color: #555; }
        
        input, select, textarea { 
            width: 100%; padding: 15px; margin-top: 8px; 
            border: 2px solid #eee; border-radius: 15px; 
            font-family: 'Tajawal', sans-serif; font-size: 1rem;
        }

        input:focus { border-color: var(--primary); outline: none; background: #fff; }

        .submit-btn { 
            background: #2ecc71; color: white; width: 100%; 
            padding: 18px; border: none; border-radius: 15px; 
            cursor: pointer; margin-top: 30px; font-weight: 800; 
            font-size: 1.2rem; box-shadow: 0 10px 20px rgba(46, 204, 113, 0.2);
        }

        /* رسالة النجاح */
        #thanks { 
            display: none; text-align: center; padding: 50px 20px; 
            animation: bounceIn 0.8s;
        }

        .success-icon { font-size: 4rem; color: #2ecc71; margin-bottom: 20px; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .back-btn {
            color: var(--secondary); cursor: pointer; font-weight: 700;
            display: inline-block; margin-bottom: 20px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container animate__animated animate__fadeInDown">
        <!-- هنا تضع رابط اللوجو الخاص بك في الـ src -->
        <div class="logo-placeholder">MY</div> 
        <h1>My Box Store</h1>
    </div>
</header>

<div class="container">
    <!-- قائمة المنتجات -->
    <div id="main-grid" class="grid animate__animated animate__fadeIn">
        <div class="card">
            <img src="Gemini_Generated_Image_wmmh7rwmmh7rwmmh.png">
            <h3>تيشرتات قطن</h3>
            <button class="btn" onclick="openForm('تيشرت قطن', true)">اطلب الآن</button>
        </div>
        <div class="card">
            <img src="mug.png">
            <h3>مجات حرارية</h3>
            <button class="btn" onclick="openForm('مج حراري', false)">اطلب الآن</button>
        </div>
        <div class="card">
            <img src="shield.png">
            <h3>دروع كريستال</h3>
            <button class="btn" onclick="openForm('درع كريستال', false)">اطلب الآن</button>
        </div>
        <div class="card">
            <img src="cert.png">
            <h3>شهادات تقدير</h3>
            <button class="btn" onclick="openForm('شهادة تقدير', false)">اطلب الآن</button>
        </div>
    </div>

    <!-- نموذج الطلب -->
    <div id="order-form">
        <span class="back-btn" onclick="location.reload()">← العودة للمتجر</span>
        <div class="form-header" id="f-title">تخصيص طلبك</div>
        <form id="contact-form">
            <label>اسمك الجميل:</label>
            <input type="text" id="cust_name" placeholder="ادخل اسمك الكامل" required>
            
            <label>رقم الواتساب:</label>
            <input type="tel" id="cust_phone" placeholder="01xxxxxxxxx" required>
            
            <div id="s-div" style="display:none;">
                <label>المقاس:</label>
                <select id="cust_size">
                    <option value="S">Small</option>
                    <option value="M" selected>Medium</option>
                    <option value="L">Large</option>
                    <option value="XL">X-Large</option>
                    <option value="XXL">XX-Large</option>
                </select>
            </div>
            
            <label>اللون المفضل:</label>
            <input type="text" id="cust_color" placeholder="مثال: أسود ملكي">
            
            <label>تفاصيل الطباعة (ملاحظاتك):</label>
            <textarea id="cust_notes" rows="4" placeholder="اكتب هنا الكلمات أو الأفكار التي تريد طباعتها..."></textarea>
            
            <button type="submit" class="submit-btn" id="s-btn">تأكيد الطلب الآن ✨</button>
        </form>
    </div>

    <!-- نجاح الإرسال -->
    <div id="thanks">
        <div class="success-icon">✅</div>
        <h2>يا بطل! تم استلام طلبك</h2>
        <p>سنقوم بمراجعته والتواصل معك فوراً عبر الواتساب.</p>
        <button class="btn" style="width:auto; padding: 12px 50px; margin-top:20px;" onclick="location.reload()">العودة للرئيسية</button>
    </div>
</div>

<script>
    let currentProduct = "";

    function openForm(name, showSize) {
        currentProduct = name;
        document.getElementById('main-grid').style.display = 'none';
        document.getElementById('order-form').style.display = 'block';
        document.getElementById('f-title').innerText = "تجهيز طلب: " + name;
        document.getElementById('s-div').style.display = showSize ? 'block' : 'none';
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    document.getElementById('contact-form').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('s-btn');
        btn.innerText = "جاري إرسال إبداعك...";
        btn.disabled = true;

        const templateParams = {
            name: document.getElementById('cust_name').value,
            prod: currentProduct,
            phone: document.getElementById('cust_phone').value,
            size: currentProduct === 'تيشرت قطن' ? document.getElementById('cust_size').value : "N/A",
            color: document.getElementById('cust_color').value || "حسب الاختيار",
            notes: document.getElementById('cust_notes').value || "لا توجد ملاحظات إضافية",
            time: new Date().toLocaleString('ar-EG')
        };

        emailjs.send("service_irixc5m", "template_9psshpd", templateParams)
        .then(() => {
            document.getElementById('order-form').style.display = 'none';
            document.getElementById('thanks').style.display = 'block';
        }, (err) => {
            alert("عذراً، حدث خطأ تقني. حاول مرة أخرى.");
            btn.disabled = false;
            btn.innerText = "تأكيد الطلب الآن ✨";
        });
    };
</script>

</body>
</html>
