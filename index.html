<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطبعة الهدايا - اختر منتجك</title>
    <style>
        :root {
            /* ألوان اللوجو المستوحاة من WhatsApp Image 2026-05-01 at 1.02.41 AM.jpeg */
            --primary-grad: linear-gradient(135deg, #3498db, #9b59b6);
            --dark: #2c3e50;
            --light: #f8f9fa;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); margin: 0; padding: 20px; }
        
        .header { text-align: center; margin-bottom: 40px; }
        .logo { max-width: 120px; border-radius: 50%; border: 3px solid #9b59b6; }

        /* شبكة المنتجات */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: auto;
        }

        .product-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.3s ease;
            border: 2px solid transparent;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: #9b59b6;
        }

        .product-card img { max-width: 100%; border-radius: 10px; height: 150px; object-fit: cover; }
        .product-card h3 { color: var(--dark); margin: 15px 0; }

        /* نموذج التفاصيل (مخفي افتراضياً) */
        #order-section {
            display: none;
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--dark); }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .btn-send {
            background: var(--primary-grad);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .back-btn { background: #eee; color: #333; margin-bottom: 20px; display: inline-block; padding: 8px 15px; border-radius: 5px; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>

<div class="header">
    <!-- تأكد من رفع صورة اللوجو باسم logo.jpg -->
    <img src="logo.jpg" alt="Logo" class="logo">
    <h1>مرحباً بك في مطبعتنا</h1>
    <p>اختر المنتج الذي ترغب في تخصيصه</p>
</div>

<!-- واجهة اختيار المنتجات -->
<div class="products-grid" id="main-grid">
    <div class="product-card" onclick="openOrder('مج (Mug)')">
        <img src="mug-placeholder.jpg" alt="Mug">
        <h3>مجات حرارية</h3>
    </div>
    <div class="product-card" onclick="openOrder('تيشرت')">
        <img src="tshirt-placeholder.jpg" alt="T-shirt">
        <h3>تيشرتات قطن</h3>
    </div>
    <div class="product-card" onclick="openOrder('درع تكريم')">
        <img src="shield-placeholder.jpg" alt="Shield">
        <h3>دروع وهدايا كريستال</h3>
    </div>
    <div class="product-card" onclick="openOrder('شهادة دراسية')">
        <img src="cert-placeholder.jpg" alt="Certificate">
        <h3>شهادات تقدير</h3>
    </div>
</div>

<!-- واجهة تفاصيل الطلب -->
<div id="order-section">
    <div class="back-btn" onclick="goBack()">← العودة للمنتجات</div>
    <h2 id="selected-product-title">تفاصيل الطلب</h2>
    <form id="detailsForm">
        <div class="form-group">
            <label>الاسم الكامل</label>
            <input type="text" id="custName" required placeholder="أدخل اسمك">
        </div>
        <div class="form-group">
            <label>رقم التواصل (واتساب)</label>
            <input type="tel" id="custPhone" required placeholder="01xxxxxxxxx">
        </div>
        <div class="form-group">
            <label>العنوان بالتفصيل</label>
            <textarea id="address" rows="2" required placeholder="المدينة، الحي، الشارع..."></textarea>
        </div>
        <div class="form-group">
            <label>ارفع الصورة المراد طباعتها</label>
            <input type="file" id="designFile" accept="image/*">
        </div>
        <div class="form-group">
            <label>ملاحظات إضافية</label>
            <textarea id="notes" rows="3" placeholder="اكتب أي تفاصيل أخرى هنا..."></textarea>
        </div>
        <button type="submit" class="btn-send">تأكيد وإرسال الطلب</button>
    </form>
</div>

<script>
    let currentProduct = "";

    function openOrder(productName) {
        currentProduct = productName;
        document.getElementById('main-grid').style.display = 'none';
        document.getElementById('order-section').style.display = 'block';
        document.getElementById('selected-product-title').innerText = "طلب: " + productName;
        window.scrollTo(0,0);
    }

    function goBack() {
        document.getElementById('main-grid').style.display = 'grid';
        document.getElementById('order-section').style.display = 'none';
    }

    document.getElementById('detailsForm').onsubmit = function(e) {
        e.preventDefault();
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        const addr = document.getElementById('address').value;
        const notes = document.getElementById('notes').value;

        // تجهيز نص الرسالة
        const msg = `طلب جديد من المتجر 🔥%0A---%0A📦 المنتج: ${currentProduct}%0A👤 العميل: ${name}%0A📞 الهاتف: ${phone}%0A📍 العنوان: ${addr}%0A📝 ملاحظات: ${notes}`;
        
        // استبدل الرقم بالرقم الخاص بك في مصر (بدون 0 في البداية)
        window.open(`https://wa.me/201234567890?text=${msg}`);
    };
</script>

</body>
</html>
