<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Box Store | هدايا وطباعة احترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-purple: #9b59b6;
            --secondary-blue: #3498db;
            --soft-bg: #f8faff;
            --dark-text: #2c3e50;
            --white: #ffffff;
            --grad: linear-gradient(135deg, #3498db, #9b59b6);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--soft-bg); color: var(--dark-text); margin: 0; padding: 0; }

        header {
            background: var(--white);
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-bottom: 3px solid var(--primary-purple);
        }

        header h1 { margin: 0; font-size: 2rem; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }

        .product-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            border: 1px solid #edf2f7;
            text-align: center;
            display: flex;
            flex-direction: column;
        }

        .img-box { background: #fdfdfd; height: 250px; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .card-content { padding: 20px; margin-top: auto; }
        .btn-order {
            display: inline-block;
            background: var(--grad);
            color: var(--white);
            padding: 12px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            border: none;
            width: 90%;
        }

        #order-section { display: none; background: var(--white); padding: 40px; border-radius: 30px; max-width: 800px; margin: 20px auto; }
        .form-group { margin-bottom: 20px; text-align: right; }
        input, textarea { width: 100%; padding: 15px; border: 2px solid #f0f3f7; border-radius: 12px; }
        .btn-submit { background: #27ae60; color: white; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>My Box Store</h1>
    <p>بوابتك للهدايا المخصصة والطباعة الإبداعية</p>
</header>

<div class="container">
    <div class="products-grid" id="main-grid">
        <!-- كرت التيشرت بالاسم الطويل الجديد -->
        <div class="product-card">
            <div class="img-box">
                <img src="Gemini_Generated_Image_wmmh7rwmmh7rwmmh.png" alt="T-Shirt">
            </div>
            <div class="card-content">
                <h3>تيشرتات قطن</h3>
                <button class="btn-order" onclick="openOrder('تيشرت قطن')">اطلب الآن</button>
            </div>
        </div>

        <div class="product-card">
            <div class="img-box"><img src="shield.png" alt="Shield"></div>
            <div class="card-content">
                <h3>دروع كريستال</h3>
                <button class="btn-order" onclick="openOrder('درع كريستال')">اطلب الآن</button>
            </div>
        </div>

        <div class="product-card">
            <div class="img-box"><img src="mug.png" alt="Mug"></div>
            <div class="card-content">
                <h3>مجات حرارية</h3>
                <button class="btn-order" onclick="openOrder('مج حراري')">اطلب الآن</button>
            </div>
        </div>

        <div class="product-card">
            <div class="img-box"><img src="cert.png" alt="Certificate"></div>
            <div class="card-content">
                <h3>شهادات تقدير</h3>
                <button class="btn-order" onclick="openOrder('شهادة تقدير')">اطلب الآن</button>
            </div>
        </div>
    </div>

    <!-- نموذج الطلب -->
    <div id="order-section">
        <div onclick="goBack()" style="cursor:pointer; color:var(--secondary-blue); margin-bottom:20px;">← العودة</div>
        <h2 id="selected-product">تفاصيل الطلب</h2>
        <form id="orderForm">
            <div class="form-group">
                <label>الاسم الكامل</label>
                <input type="text" id="custName" required>
            </div>
            <div class="form-group">
                <label>العنوان</label>
                <input type="text" id="custAddr" required>
            </div>
            <div class="form-group">
                <label>ملاحظات إضافية</label>
                <textarea id="custNotes" rows="3"></textarea>
            </div>
            <button type="submit" class="btn-submit">تأكيد عبر واتساب</button>
        </form>
    </div>
</div>

<script>
    let pName = "";
    function openOrder(product) {
        pName = product;
        document.getElementById('main-grid').style.display = 'none';
        document.getElementById('order-section').style.display = 'block';
        document.getElementById('selected-product').innerText = "اطلب الآن: " + product;
    }
    function goBack() {
        document.getElementById('main-grid').style.display = 'grid';
        document.getElementById('order-section').style.display = 'none';
    }
    document.getElementById('orderForm').onsubmit = function(e) {
        e.preventDefault();
        const text = `*طلب جديد*%0Aالمنتج: ${pName}%0Aالاسم: ${document.getElementById('custName').value}%0Aالعنوان: ${document.getElementById('custAddr').value}`;
        window.open(`https://wa.me/201032543968?text=${text}`);
    };
</script>

</body>
</html>
